name: CTI Pipeline (Tabella + Sito Web)

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Installa i requisiti
        run: |
          pip install pyyaml mkdocs-material mkdocs-roamlinks-plugin

      - name: 1. Genera la Tabella (Script Custom)
        run: python generate_table.py

      - name: 2. Configura Git e Salva il README aggiornato
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-update: Tabella CTI [skip ci]" || true
          git push || true

      - name: 3. Costruisci e Pubblica il Sito Web
        run: |
          # --- TRUCCO PER MKDOCS ---
          # Creiamo una cartella 'docs' temporanea e ci copiamo i file
          # così MkDocs non si lamenta del conflitto di cartelle
          mkdir -p docs
          cp README.md docs/index.md
          
          # Copiamo le tue cartelle di analisi (se esistono)
          [ -d "Actors" ] && cp -r Actors docs/
          [ -d "TTP_&_Malware" ] && cp -r TTP_&_Malware docs/
          
          # Lanciamo il deploy
          mkdocs gh-deploy --force --clean